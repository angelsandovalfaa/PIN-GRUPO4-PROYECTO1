services:
  pin-app:
    image: pin-app:local
    container_name: pin-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PORT: "80"
      REDIS_URL: redis://redis:6379
      REDIS_TTL: "300"
      OPEN_METEO_URL: https://api.open-meteo.com
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: pin-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: pin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: pin-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      # Sin acceso anonimo ni alta de usuarios (coherente con el deploy AWS,
      # donde Grafana es publico). Ver docs/decisions/0002.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - ./provisioning:/etc/grafana/provisioning:ro

volumes:
  grafana-data: