services:
  pin-app:
    image: pin-app:local
    container_name: pin-app
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      REDIS_TTL: "${REDIS_TTL:-300}"
      OPEN_METEO_URL: "${OPEN_METEO_URL:-https://api.open-meteo.com}"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:8.8.0-alpine
    container_name: pin-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: pin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro

  grafana:
    image: grafana/grafana:13.0.2
    container_name: pin-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      # Dashboard publico de solo-lectura: anonimo con rol Viewer (se ve sin
      # login), admin protegido por password, sin alta de usuarios. Coherente
      # con el deploy AWS. Ver docs/decisions/0002.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - ./provisioning:/etc/grafana/provisioning:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: pin-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: pin-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

volumes:
  grafana-data: