name: Terraform Validate

# Valida los modulos Terraform en cada PR/push: formato, sintaxis y
# misconfiguraciones de seguridad. Corre standalone (no por el orquestador) para
# dar feedback temprano: hoy un .tf malformado se detecta recien en el deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Solo valida (read-only, no aplica nada), asi que cancelar un run viejo al
# pushear de nuevo es seguro (a diferencia del deploy).
concurrency:
  group: terraform-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: fmt, validate y scan de seguridad
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate (cada modulo)
        run: |
          for d in terraform/*/; do
            if ls "$d"*.tf >/dev/null 2>&1; then
              echo "== validate ${d} =="
              terraform -chdir="$d" init -backend=false -input=false
              terraform -chdir="$d" validate
            fi
          done

      - name: Trivy config (misconfig de IaC, reemplaza al deprecado tfsec)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          # Modo reporte en el primer pase: no bloquea el merge. Para volverlo
          # gate duro, poner exit-code: '1' tras triagear los findings.
          exit-code: '0'
