name: Reusable CI Docker

on:
  workflow_call:
    outputs:
      image_ref:
        description: Imagen construida y publicada
        value: ${{ jobs.docker.outputs.image_ref }}

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set short SHA
        id: meta
        run: |
          TAG=$(echo "${GITHUB_SHA}" | cut -c1-7)
          IMAGE_REF="ghcr.io/${GITHUB_REPOSITORY_OWNER}/pin-app:${TAG}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      # Solo se pushea la imagen en push a main (la que despues deploya el 40).
      # En PRs se buildea pero no se pushea: valida que el Dockerfile compile sin
      # publicar. Ademas, los PRs de dependabot tienen GITHUB_TOKEN read-only y un
      # push fallaria con 403; asi se evita.
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.image_ref }}
