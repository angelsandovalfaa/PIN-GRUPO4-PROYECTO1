name: Reusable CI Security and SBOM

on:
  workflow_call:

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Validate SNYK_TOKEN
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "SNYK_TOKEN no esta configurado en GitHub Secrets."
            exit 1
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk test
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/package.json

  sbom:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build de la imagen (local, sin push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./app
          file: ./app/Dockerfile
          load: true
          tags: pin-app:scan

      - name: Trivy (vulnerabilidades de la imagen)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: pin-app:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Modo reporte: no bloquea el merge por CVEs de la imagen base que no
          # siempre tienen fix. Para volverlo gate duro, poner exit-code: '1'.
          exit-code: '0'

      - name: SBOM de la imagen (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: pin-app:scan
          format: cyclonedx-json
          output-file: sbom-image-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-image-cyclonedx
          path: sbom-image-cyclonedx.json
          if-no-files-found: error
          retention-days: 30
