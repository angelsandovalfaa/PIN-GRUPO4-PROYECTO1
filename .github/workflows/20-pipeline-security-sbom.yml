name: Reusable CI Security and SBOM

on:
  workflow_call:

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Snyk se saltea en PRs de dependabot: GitHub no expone los secrets de
      # Actions a esos runs por seguridad, asi que SNYK_TOKEN llega vacio. Antes
      # esto hacia fallar el job a todos los PRs de dependabot. ESLint y el resto
      # del pipeline igual corren. En PRs normales y en push a main el token si
      # esta, y aca sigue siendo gate duro (validacion + scan).
      - name: Validate SNYK_TOKEN
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "SNYK_TOKEN no esta configurado en GitHub Secrets."
            exit 1
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk test
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/package.json

  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build de la imagen (local, sin push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./app
          file: ./app/Dockerfile
          load: true
          tags: pin-app:scan

      - name: Trivy (vulnerabilidades de la imagen)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: pin-app:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Modo reporte: no bloquea el merge por CVEs de la imagen base que no
          # siempre tienen fix. Para volverlo gate duro, poner exit-code: '1'.
          exit-code: '0'

      - name: SBOM de la imagen (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: pin-app:scan
          format: cyclonedx-json
          output-file: sbom-image-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-image-cyclonedx
          path: sbom-image-cyclonedx.json
          if-no-files-found: error
          retention-days: 30
