name: Destroy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Escribe DESTROY para eliminar toda la infraestructura"
        required: true
        type: string

jobs:
  destroy:
    name: Terraform Destroy AWS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Group estatico compartido con deploy/rollback/bootstrap: serializa todas
    # las operaciones sobre el state remoto, no compiten por el lock.
    concurrency:
      group: terraform-aws
      cancel-in-progress: false
    # Gate de aprobacion humana. Para que frene de verdad hay que crear el
    # environment 'production-destroy' en Settings > Environments con required
    # reviewers; sin esa config el environment existe pero no bloquea (no-op).
    # El destroy es puerta de una via, por eso merece el gate ademas del confirm.
    environment:
      name: production-destroy
    if: github.event.inputs.confirm_destroy == 'DESTROY'

    defaults:
      run:
        working-directory: terraform/aws

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Validate Terraform backend secrets
        run: |
          test -n "${TF_STATE_BUCKET}" || (echo "Falta secret TF_STATE_BUCKET" && exit 1)
          test -n "${TF_STATE_KEY}" || (echo "Falta secret TF_STATE_KEY" && exit 1)
          test -n "${TF_LOCK_TABLE}" || (echo "Falta secret TF_LOCK_TABLE" && exit 1)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -input=false -auto-approve
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
          TF_VAR_project_name: ${{ secrets.EC2_PROJECT_NAME }}
          TF_VAR_ghcr_username: ${{ secrets.GHCR_USERNAME }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
