name: Reusable CI Deploy AWS

on:
  workflow_call:
    inputs:
      image_ref:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform plan -input=false -var="app_image=${{ inputs.image_ref }}"
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
          TF_VAR_project_name: ${{ secrets.EC2_PROJECT_NAME }}


      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -var="app_image=${{ inputs.image_ref }}"
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
          TF_VAR_project_name: ${{ secrets.EC2_PROJECT_NAME }}
