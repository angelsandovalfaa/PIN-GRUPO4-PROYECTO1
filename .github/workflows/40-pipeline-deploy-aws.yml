name: Reusable CI Deploy AWS

on:
  workflow_call:
    inputs:
      image_ref:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Grupo estatico (no por github.workflow) para que el deploy normal y el
    # rollback (50), que reusan este mismo job, compartan cola y no corran a la
    # vez compitiendo por el lock de DynamoDB del state.
    concurrency:
      group: terraform-aws
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform/aws
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Validate Terraform backend secrets
        run: |
          test -n "${TF_STATE_BUCKET}" || (echo "Falta secret TF_STATE_BUCKET" && exit 1)
          test -n "${TF_STATE_KEY}" || (echo "Falta secret TF_STATE_KEY" && exit 1)
          test -n "${TF_LOCK_TABLE}" || (echo "Falta secret TF_LOCK_TABLE" && exit 1)
          test -n "${EC2_PROJECT_NAME}" || (echo "Falta secret EC2_PROJECT_NAME" && exit 1)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          EC2_PROJECT_NAME: ${{ secrets.EC2_PROJECT_NAME }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform plan -input=false -var="app_image=${{ inputs.image_ref }}"
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
          TF_VAR_project_name: ${{ secrets.EC2_PROJECT_NAME }}
          TF_VAR_ghcr_username: ${{ secrets.GHCR_USERNAME }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}


      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -var="app_image=${{ inputs.image_ref }}"
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
          TF_VAR_project_name: ${{ secrets.EC2_PROJECT_NAME }}
          TF_VAR_ghcr_username: ${{ secrets.GHCR_USERNAME }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
