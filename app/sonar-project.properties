# Config del scan de SonarQube Cloud (CI-based). El scanner corre con
# projectBaseDir=app, asi las rutas del lcov (src/...) matchean con sonar.sources.
#
# IMPORTANTE: projectKey y organization son los del proyecto en SonarQube Cloud.
# Estan con la convencion estandar de binding de GitHub; si en SonarQube Cloud
# figuran distintos, corregir estas dos lineas (si no, el scan falla).
sonar.projectKey=angelsandovalfaa_PIN-GRUPO4-PROYECTO1
sonar.organization=angelsandovalfaa

sonar.sources=src
sonar.tests=test

# Cobertura: lcov generado por node --test (mismo basedir que sonar.sources).
sonar.javascript.lcov.reportPaths=lcov.info

sonar.exclusions=node_modules/**,public/**
